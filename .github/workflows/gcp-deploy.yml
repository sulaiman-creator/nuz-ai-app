name: Deploy Nuz AI to Google Cloud Run

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authenticate with Google Cloud using a Service Account Key
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: cprnd-496814

      # Authenticate Docker to push directly to Google Container Registry (GCR)
      - name: Configure Docker
        run: |
          gcloud auth configure-docker gcr.io --quiet

      # Step 1: Build the Docker image inside the GitHub Actions Runner
      - name: Build Docker Image
        run: |
          docker build -t gcr.io/cprnd-496814/nuz-ai-backend:${{ github.sha }} .

      # Step 2: Push the image directly to Google Container Registry
      - name: Push Docker Image
        run: |
          docker push gcr.io/cprnd-496814/nuz-ai-backend:${{ github.sha }}

      # Step 3: Deploy the image to Google Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy nuz-ai-backend \
            --image gcr.io/cprnd-496814/nuz-ai-backend:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated
